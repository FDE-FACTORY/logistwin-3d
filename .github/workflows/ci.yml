name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: 백엔드 (빌드·스모크)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # 헤드리스 스모크 — Single vs Dual 비교가 정상 종료하면 코어 동작 검증
      - run: node src/compare.js --ticks=300 --rate=20
      # CAD 임포트 동작 확인
      - run: node src/cad/importLayout.js --width 60 --depth 35 --height 8 --name "CI Check"

  web:
    name: 프론트엔드 (빌드)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
